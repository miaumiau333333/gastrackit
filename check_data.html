<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .data { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>Verificação de Dados</h1>
    <div id="output"></div>
    
    <script>
        const output = document.getElementById('output');
        
        function log(message, isError = false) {
            const div = document.createElement('div');
            div.className = isError ? 'error' : 'success';
            div.textContent = message;
            output.appendChild(div);
        }
        
        log('Verificando dados localStorage...');
        
        try {
            const lisnaveData = localStorage.getItem('lisnave_data');
            if (lisnaveData) {
                log('Dados encontrados no localStorage');
                const parsed = JSON.parse(lisnaveData);
                log('Dados parseados com sucesso');
                
                if (parsed.cylinders && Array.isArray(parsed.cylinders)) {
                    log(`Cilindros: ${parsed.cylinders.length} encontrados`);
                    if (parsed.cylinders.length === 0) {
                        log('AVISO: Array de cilindros está vazio!', true);
                    } else {
                        parsed.cylinders.slice(0, 3).forEach((c, i) => {
                            log(`Cilindro ${i+1}: ${c.id} - ${c.type} - ${c.status}`);
                        });
                    }
                } else {
                    log('ERRO: Propriedade cylinders não encontrada ou não é array', true);
                }
                
                if (parsed.workers && Array.isArray(parsed.workers)) {
                    log(`Operadores: ${parsed.workers.length} encontrados`);
                } else {
                    log('ERRO: Propriedade workers não encontrada ou não é array', true);
                }
            } else {
                log('Nenhum dado encontrado no localStorage - usará dados padrão');
            }
        } catch (error) {
            log(`ERRO: ${error.message}`, true);
        }
        
        // Testar dados padrão
        log('\nTestando dados padrão...');
        const DEFAULT_CYLINDERS = [
            {id:'GAS-001',type:'Acetileno',zoneId:'DS1',lat:38.479,  lng:-8.792, status:'ativa',     ts:'01/01/2025',worker:'J. Ferreira',pres:145},
            {id:'GAS-002',type:'Oxigénio', zoneId:'DS1',lat:38.4791, lng:-8.7921,status:'recolha',   ts:'15/01/2025',worker:'M. Santos',  pres:198},
            {id:'GAS-003',type:'Propano',  zoneId:'DS2',lat:38.478,  lng:-8.793, status:'ativa',     ts:'20/01/2025',worker:'R. Costa',   pres:87}
        ];
        
        log(`Dados padrão: ${DEFAULT_CYLINDERS.length} cilindros`);
        
        // Botão para limpar localStorage
        const clearBtn = document.createElement('button');
        clearBtn.textContent = 'Limpar localStorage e recarregar página principal';
        clearBtn.style.marginTop = '20px';
        clearBtn.onclick = () => {
            localStorage.removeItem('lisnave_data');
            log('localStorage limpo! Recarregue a página principal.', false);
            setTimeout(() => window.location.href = '/', 2000);
        };
        document.body.appendChild(clearBtn);
    </script>
</body>
</html>
